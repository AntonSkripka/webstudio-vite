                        class="header__nav-logo--span">Web</span>Studio</a>
                <ul class="nav-list"></ul>
            </nav>
            <ul class="contacts-list"></ul>
            <button class="burger-menu__open" data-burger-open>
                <svg width="16px" height="24px">
                    <use href="images/symboldefs.svg#burger"></use>
                </svg>
            </button>
            <div class="burger-menu displaynone" data-burger>

                        <use href="images/symboldefs.svg#burger-close"></use>
                    </svg>

                <ul class="bcontacts-list"></ul>

            </div>

                        <button class="footer__submit" type="submit">
                            Підписатися
                            <svg width="24px" height="24px">
                                <use href="images/symboldefs.svg#subscribe"></use>
                            </svg>
                        </button>

            </div>
